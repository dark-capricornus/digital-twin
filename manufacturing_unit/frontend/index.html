<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Twin — Alloy Wheel Manufacturing</title>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-25..0"
        rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="assets/angles logo.ico">
    <link rel="stylesheet" href="css/style.css?v=3">
</head>

<body>

    <!-- ─── Top Navbar ─────────────────────────────────────── -->
    <div id="top-navbar">
        <div class="navbar-left">
            <div class="navbar-accent-bar"></div>
            <h1 class="navbar-title">DT-MANUFACTURING</h1>
        </div>
        <div class="navbar-right">
            <div class="navbar-status-dot"></div>
            <span class="navbar-status-text">Online</span>
            <div class="navbar-divider"></div>
            <div id="utc-time" class="navbar-clock">00:00:00 UTC</div>
        </div>
    </div>

    <!-- ─── Unified Right Sidebar (V1.2) ─── -->
    <div id="hud-right-sidebar">
        <!-- Zone Carousel (Sticky) -->
        <div id="sidebar-sticky-header">
            <div id="zone-carousel">
                <button id="zone-prev" class="zone-nav-btn"><span class="material-symbols-outlined">chevron_left</span></button>
                <span id="zone-name">SMELTING</span>
                <button id="zone-next" class="zone-nav-btn"><span class="material-symbols-outlined">chevron_right</span></button>
                <button id="sidebar-close-btn" class="sidebar-close-btn"><span class="material-symbols-outlined">close</span></button>
            </div>
            <!-- Asset Carousel with Nav Arrows -->
            <div id="asset-nav-container">
                <button id="asset-prev" class="asset-nav-btn"><span class="material-symbols-outlined">chevron_left</span></button>
                <div id="asset-carousel"></div>
                <button id="asset-next" class="asset-nav-btn"><span class="material-symbols-outlined">chevron_right</span></button>
            </div>
        </div>

        <!-- Scrollable Sections -->
        <div id="sidebar-scroll">
            <!-- 1. Asset Details (card with service dates) -->
            <div id="sb-asset-header"></div>

            <!-- 2. Plant Data (plant-level KPIs) -->
            <div class="sb-section">
                <div class="sb-section-header">
                    <span class="material-symbols-outlined sb-section-icon">factory</span>
                    <span class="sb-section-title">PLANT DATA</span>
                </div>
                <div class="sb-divider"></div>
                <div id="sb-plant" class="sb-metric-flow"></div>
            </div>

            <!-- 3. Production Data -->
            <div class="sb-section">
                <div class="sb-section-header">
                    <span class="material-symbols-outlined sb-section-icon">inventory_2</span>
                    <span class="sb-section-title">PRODUCTION</span>
                </div>
                <div class="sb-divider"></div>
                <div id="sb-production" class="sb-metric-flow"></div>
            </div>

            <!-- 4. Alarms -->
            <div class="sb-section">
                <div class="sb-section-header">
                    <span class="material-symbols-outlined sb-section-icon">warning</span>
                    <span class="sb-section-title">ALARMS</span>
                </div>
                <div class="sb-divider"></div>
                <div id="sb-alarms"></div>
            </div>

            <!-- 5. Maintenance -->
            <div class="sb-section">
                <div class="sb-section-header">
                    <span class="material-symbols-outlined sb-section-icon">build</span>
                    <span class="sb-section-title">MAINTENANCE</span>
                </div>
                <div class="sb-divider"></div>
                <div id="sb-maintenance"></div>
            </div>
        </div>
    </div>

    <!-- ─── Loading Screen ─────────────────────────────────── -->
    <div id="loading-screen" class="fixed inset-0 bg-[#0A0A0A] z-[9999] flex flex-col items-center justify-center gap-4">
        <div class="w-12 h-12 border-2 border-[#00D1FF] border-t-transparent animate-spin"></div>
        <div class="text-[10px] font-bold text-[#00D1FF] tracking-[0.4em] uppercase">Initializing Twin</div>
    </div>

    <!-- ─── 3D Scene Container (100% viewport) ────────────── -->
    <div id="container" class="absolute inset-0 bg-[#0A0A0A]"></div>







    <!-- Import maps for Three.js ES modules -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>



    <!-- Application modules -->
    <script type="module" src="js/main.js"></script>
</body>

</html>
