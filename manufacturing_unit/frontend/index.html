<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Twin — Alloy Wheel Manufacturing</title>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- ─── Loading Screen ─────────────────────────────────── -->
    <div id="loading-screen">
        <div class="loading-spinner"></div>
        <div class="loading-text">Loading Plant Model...</div>
    </div>

    <!-- ─── 1. Top Status Strip (56px) ──────────────────── -->
    <header id="top-status-strip">
        <div class="strip-left">
            <div class="icon">
                <span class="material-symbols-outlined">factory</span>
            </div>
            <span>AL-WHEEL UNIT #04</span>
            <button id="kpi-chevron" class="kpi-chevron" title="Toggle KPI Dashboard">
                <span class="material-symbols-outlined">expand_more</span>
            </button>
        </div>
        <div class="strip-right">
            <div class="status-indicator">
                <span class="status-dot online"></span>
                <span id="connection-status">System Online</span>
            </div>
            <div class="status-indicator">
                <span class="material-symbols-outlined" style="font-size: 14px; color: var(--accent-blue)">hub</span>
                <span id="gateway-latency">Node 12ms</span>
            </div>
            <div class="nav-clock">
                <span class="material-symbols-outlined" style="font-size: 14px">schedule</span>
                <span id="utc-time">00:00:00 UTC</span>
            </div>
        </div>
    </header>

    <!-- ─── 2. KPI Summary Row (80px) ──────────────────── -->
    <div id="kpi-summary-row">
        <div class="kpi-card" style="border-left-color: var(--accent-blue)">
            <span class="kpi-label">Total Load</span>
            <div class="kpi-value-row">
                <span class="kpi-value" id="plant-kw">---</span>
                <span class="kpi-unit">MW</span>
                <span class="kpi-trend up" id="kw-trend">0.0%</span>
            </div>
        </div>
        <div class="kpi-card" style="border-left-color: var(--accent-blue)">
            <span class="kpi-label">Throughput</span>
            <div class="kpi-value-row">
                <span class="kpi-value" id="plant-prod">---</span>
                <span class="kpi-unit">units</span>
                <span class="kpi-trend down" id="prod-trend">0.0%</span>
            </div>
        </div>
        <div class="kpi-card" style="border-left-color: var(--accent-blue)">
            <span class="kpi-label">Efficiency (OEE)</span>
            <div class="kpi-value-row">
                <span class="kpi-value" id="plant-oee">---</span>
                <span class="kpi-unit">%</span>
                <span class="kpi-trend up" id="oee-trend">0.0%</span>
            </div>
        </div>
        <div class="kpi-card" style="border-left-color: var(--accent-blue)">
            <span class="kpi-label">Energy / Unit</span>
            <div class="kpi-value-row">
                <span class="kpi-value" id="plant-epu">---</span>
                <span class="kpi-unit">kWh</span>
                <span class="kpi-trend down" id="epu-trend">0.0%</span>
            </div>
        </div>
        <div class="kpi-card" style="border-left-color: var(--accent-blue)">
            <span class="kpi-label">Utilization</span>
            <div class="kpi-value-row">
                <span class="kpi-value" id="plant-util">---</span>
                <span class="kpi-unit">%</span>
                <span class="kpi-trend up" id="util-trend">0.0%</span>
            </div>
        </div>
    </div>

    <!-- ─── 3D Scene Container (100% viewport) ────────────── -->
    <div id="container"></div>

    <!-- ─── 3. Dual Sidebar Architecture ────────────────── -->
    <!-- Left Sidebar: Plant & Zone Analytics -->
    <div id="left-sidebar" class="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-header-titles">
                <span class="sidebar-header-label">Operational Scope</span>
                <span id="left-panel-title" class="sidebar-header-title">Plant Overview</span>
            </div>
            <button id="close-left-panel" class="close-btn">
                <span class="material-symbols-outlined">close</span>
            </button>
        </div>
        <div id="left-panel-content" class="sidebar-content">
            <div class="sidebar-nav-list" id="left-nav-list">
                <!-- Nav items injected via JS -->
            </div>
        </div>
    </div>

    <!-- Right Sidebar: Machine Precision Data -->
    <div id="right-sidebar" class="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-header-titles">
                <span class="sidebar-header-label">Asset Intelligence</span>
                <span id="right-panel-title" class="sidebar-header-title">Machine Details</span>
            </div>
            <button id="close-right-panel" class="close-btn">
                <span class="material-symbols-outlined">close</span>
            </button>
        </div>
        <div id="right-panel-content" class="sidebar-content">
            <!-- Dynamic content injection -->
        </div>
    </div>

    <!-- ─── 4. Compact Zone Selector (Above Bottom Bar) ───── -->
    <div id="compact-zone-selector" class="hidden">
        <div class="zone-scroll">
            <button class="zone-pill" data-zone="smelting">Smelting</button>
            <button class="zone-pill" data-zone="die_casting">Die Casting</button>
            <button class="zone-pill" data-zone="machining">Machining</button>
            <button class="zone-pill" data-zone="heat_treating">Heat Treating</button>
            <button class="zone-pill" data-zone="qc">QC</button>
            <button class="zone-pill" data-zone="paint_shop">Paint Shop</button>
            <button class="zone-pill" data-zone="shipping">Shipping</button>
        </div>
    </div>

    <!-- ─── 5. Bottom Icon Control Bar (72px) ─────────────── -->
    <footer id="bottom-control-bar">
        <button class="nav-item active" data-action="plant">
            <span class="material-symbols-outlined">factory</span>
            <span class="nav-label">Plant</span>
        </button>
        <button class="nav-item" data-action="zones">
            <span class="material-symbols-outlined">map</span>
            <span class="nav-label">Zones</span>
        </button>
        <button class="nav-item" data-action="machines">
            <span class="material-symbols-outlined">precision_manufacturing</span>
            <span class="nav-label">Machines</span>
        </button>
        <button class="nav-item" data-action="energy">
            <span class="material-symbols-outlined">bolt</span>
            <span class="nav-label">Energy</span>
        </button>
        <button class="nav-item" data-action="safety">
            <span class="material-symbols-outlined">shield</span>
            <span class="nav-label">Safety</span>
        </button>
        <button class="nav-item" data-action="gemba">
            <span class="material-symbols-outlined">accessibility</span>
            <span class="nav-label">Gemba</span>
        </button>
    </footer>



    <!-- Import maps for Three.js ES modules -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>



    <!-- Application modules -->
    <script type="module" src="js/main.js"></script>
</body>

</html>
